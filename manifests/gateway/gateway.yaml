apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: calico-demo-gw
  namespace: default
spec:
  gatewayClassName: envoy-gateway # Must match your kubectl get gatewayclass
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: frontend-tls-secret
            namespace: envoy-gateway-system # Matches the Certificate spec
      allowedRoutes:
        namespaces:
          from: All